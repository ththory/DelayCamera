# AIDD-S029: 3중 스택 CI 품질 게이트
# FR-8.3/8.4 (보안·크기 스캔) + FR-4.3 (커버리지 80%+)
# Java: S010 결정에 따라 이연 — 조건부 실행으로 포함 (비활성)
name: AIDD CI Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  COVERAGE_THRESHOLD: 80

jobs:
  # ────────────────────────────────────────
  # 공통: diff 크기 + 비밀 스캔 (FR-8.3/8.1)
  # ────────────────────────────────────────
  security-scan:
    name: "Security & Size Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "[FR-8.3] PR diff 크기 확인 (≤300 LOC)"
        if: github.event_name == 'pull_request'
        run: |
          LIMIT=300
          TOTAL=$(git diff --numstat \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            | awk '{add+=$1; del+=$2} END {print add+del}')
          echo "PR diff: ${TOTAL:-0} LOC"
          if [[ "${TOTAL:-0}" -gt "$LIMIT" ]]; then
            echo "❌ ${TOTAL} LOC > ${LIMIT} LOC 한도 — 커밋 분할 필요"
            exit 1
          fi
          echo "✅ diff 크기 OK"

      - name: "[FR-8.1] TruffleHog 시크릿 스캔"
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || 'HEAD~1' }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # ────────────────────────────────────────
  # Python 스택
  # ────────────────────────────────────────
  python:
    name: "Python — Lint · Type · Security · Test · Mutation"
    runs-on: ubuntu-latest
    if: |
      hashFiles('pyproject.toml') != '' ||
      hashFiles('setup.py') != '' ||
      hashFiles('requirements*.txt') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install uv + deps
        run: pip install uv && uv sync --all-extras

      - name: "[convention-py] ruff lint"
        run: uv run ruff check src/ tests/

      - name: "[convention-py] ruff format check"
        run: uv run ruff format --check src/ tests/

      - name: "[convention-py] mypy strict"
        run: uv run mypy src/ --strict

      - name: "[FR-8.1] bandit 보안 분석"
        run: uv run bandit -r src/ -ll -x tests/

      - name: "[FR-8.4] Safety 의존성 취약점"
        run: |
          uv run pip install safety
          uv run safety check --full-report
        continue-on-error: false

      - name: "[FR-8.4] Snyk 의존성 취약점"
        if: env.SNYK_TOKEN != ''
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: "[FR-4.3] pytest + coverage (≥80%)"
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }}

      - name: "[mutation] mutmut 뮤테이션 테스트"
        run: |
          uv run mutmut run --paths-to-mutate=src/ || true
          uv run mutmut results
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true

  # ────────────────────────────────────────
  # TypeScript 스택
  # ────────────────────────────────────────
  typescript:
    name: "TypeScript — Lint · Type · Security · Test · Mutation"
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install deps
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: "[convention-ts] biome lint + format"
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm biome check src/
          else
            npx biome check src/
          fi

      - name: "[convention-ts] tsc strict"
        run: npx tsc --noEmit

      - name: "[FR-8.4] npm audit"
        run: npm audit --audit-level=high

      - name: "[FR-8.4] Snyk 의존성 취약점"
        if: env.SNYK_TOKEN != ''
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: "[FR-4.3] vitest + coverage (≥80%)"
        run: |
          npx vitest run \
            --coverage \
            --coverage.thresholds.lines=${{ env.COVERAGE_THRESHOLD }} \
            --coverage.thresholds.functions=${{ env.COVERAGE_THRESHOLD }} \
            --coverage.thresholds.branches=${{ env.COVERAGE_THRESHOLD }}

      - name: "[mutation] Stryker 뮤테이션 테스트"
        run: npx stryker run
        continue-on-error: true

  # ────────────────────────────────────────
  # Java 스택 (S010 결정: 이연 — 비활성)
  # 활성화: 리포 변수 ENABLE_JAVA_CI=true 설정
  # ────────────────────────────────────────
  java:
    name: "Java — Lint · Type · Security · Test · Mutation (이연)"
    runs-on: ubuntu-latest
    if: vars.ENABLE_JAVA_CI == 'true' && hashFiles('pom.xml', 'build.gradle') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: "Maven verify (compile + test)"
        run: mvn verify -B

      - name: "Checkstyle + SpotBugs + PMD"
        run: mvn -B -DskipTests checkstyle:check spotbugs:check pmd:check

      - name: "[FR-8.4] Snyk Java 취약점"
        if: env.SNYK_TOKEN != ''
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: "[FR-4.3] PIT 뮤테이션 + 커버리지 (≥80%)"
        run: mvn pitest:mutationCoverage -B

  # ────────────────────────────────────────
  # 결과 게이트 (모든 필수 잡 통과 필요)
  # ────────────────────────────────────────
  ci-gate:
    name: "CI Gate — All Required Jobs"
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "❌ security-scan 실패"
            exit 1
          fi
          echo "✅ 필수 게이트 통과"
